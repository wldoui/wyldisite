<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ОМГ МОЙ НОВЫЙ САЙТ???</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400&display=swap');
        
        body {
			background-image: url('source/img_girl.png');
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Pixelify Sans', sans-serif;
            color: #00ff00;
            overflow: hidden;
        }

        #screen-container {
            position: relative;
            width: 600px;
            height: 400px;
            border-radius: 15px;
            background-color: #1e1e1e;
            overflow-y: scroll;
            padding: 20px;
            border: 5px solid #3a3a3a;
            box-shadow: 0 0 20px #000, inset 0 0 10px #000;
            text-align: center;
        }

        #screen-container::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(transparent 25%, rgba(0, 0, 0, 0.2) 50%, transparent 75%);
            background-size: 100% 5px;
            opacity: 0.2;
            pointer-events: none;
        }

        #game-text {
            white-space: pre-line;
            text-align: center;
            line-height: 1.5;
            color: #00ff00;
            font-size: 16px;
        }

        .ascii-art {
            font-family: monospace;
            font-size: 14px;
            white-space: pre;
            line-height: 1.2;
        }

        #command-input {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 15px;
        }

        #input {
            width: 580px;
            font-size: 16px;
            padding: 8px;
            border: 2px solid #3a3a3a;
            background-color: #111;
            color: #00ff00;
            margin-bottom: 10px;
        }

        #submit-button {
            font-size: 14px;
            padding: 10px;
            width: 100px;
            background-color: #3a3a3a;
            color: #00ff00;
            border: 2px solid #555;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        #submit-button:hover {
            background-color: #555555;
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            pointer-events: none;
        }
    </style>
</head>
