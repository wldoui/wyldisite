<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Лоботомия Мозга</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400&display=swap');
        
        body {
            background-color: #000000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Pixelify Sans', sans-serif;
            color: #00ff00;
            overflow: hidden;
        }

        #screen-container {
            position: relative;
            width: 600px;
            height: 400px;
            border-radius: 15px;
            background-color: #1e1e1e;
            overflow-y: scroll;
            padding: 20px;
            border: 5px solid #3a3a3a;
            box-shadow: 0 0 20px #000, inset 0 0 10px #000;
            text-align: center;
        }

        #screen-container::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(transparent 25%, rgba(0, 0, 0, 0.2) 50%, transparent 75%);
            background-size: 100% 5px;
            opacity: 0.2;
            pointer-events: none;
        }

        #game-text {
            white-space: pre-line;
            text-align: center;
            line-height: 1.5;
            color: #00ff00;
            font-size: 16px;
        }

        .ascii-art {
            font-family: monospace;
            font-size: 14px;
            white-space: pre;
            line-height: 1.2;
        }

        #command-input {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 15px;
        }

        #input {
            width: 580px;
            font-size: 16px;
            padding: 8px;
            border: 2px solid #3a3a3a;
            background-color: #111;
            color: #00ff00;
            margin-bottom: 10px;
        }

        #submit-button {
            font-size: 14px;
            padding: 10px;
            width: 100px;
            background-color: #3a3a3a;
            color: #00ff00;
            border: 2px solid #555;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        #submit-button:hover {
            background-color: #555555;
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <canvas id="bg" width="4800" height="4800"></canvas>

    <div id="screen-container">
        <div id="game-text"></div>
    </div>

    <div id="command-input">
        <input type="text" id="input" placeholder="Введите команду..." autofocus />
        <button id="submit-button" onclick="executeCommand()">Отправить</button>
    </div>

    <script>
        const gameText = document.getElementById("game-text");
        const inputField = document.getElementById("input");

        var bg = document.getElementById('bg'),
            ctx = bg.getContext('2d'),
            fishEyeCanvas = document.createElement('canvas'),
            fishEyeCtx = fishEyeCanvas.getContext('2d');

        fishEyeCanvas.width = 200;
        fishEyeCanvas.height = 200;

        function loadBackgroundImage(src) {
            const img = new Image();
            img.crossOrigin = 'Anonymous';
            img.onload = () => {
                ctx.drawImage(img, 0, 0, bg.width, bg.height);
                window.addEventListener('mousemove', applyDistortion);
            };
            img.src = src;
        }

        function applyDistortion(e) {
            const cx = e.clientX;
            const cy = e.clientY;
            fishEyeCtx.clearRect(0, 0, fishEyeCanvas.width, fishEyeCanvas.height);
            fishEyeCtx.drawImage(bg, cx - 100, cy - 100, 200, 200, 0, 0, 200, 200);
            applyFishEyeEffect();
        }

        function applyFishEyeEffect() {
            const imgData = fishEyeCtx.getImageData(0, 0, fishEyeCanvas.width, fishEyeCanvas.height);
            const data = imgData.data;
            const w = fishEyeCanvas.width;
            const h = fishEyeCanvas.height;

            for (let y = 0; y < h; y++) {
                for (let x = 0; x < w; x++) {
                    const dx = x - w / 2;
                    const dy = y - h / 2;
                    const r = Math.sqrt(dx * dx + dy * dy) / (w / 2);
                    if (r < 1) {
                        const nx = Math.round((dx * r) + (w / 2));
                        const ny = Math.round((dy * r) + (h / 2));
                        if (nx >= 0 && ny >= 0 && nx < w && ny < h) {
                            const index = (ny * w + nx) * 4;
                            const idx = (y * w + x) * 4;
                            data[idx] = data[index];
                            data[idx + 1] = data[index + 1];
                            data[idx + 2] = data[index + 2];
                            data[idx + 3] = data[index + 3];
                        }
                    }
                }
            }
            fishEyeCtx.putImageData(imgData, 0, 0);
            document.body.style.backgroundImage = `url(${fishEyeCanvas.toDataURL()})`;
        }

        let playerState = {
            location: "начало",
            inventory: []
        };

        const art = {
            "лаборатория": `
          +-----------------+
          |                 |
          |                 |
          |\\               /|
          | \\_ _       _ _/ |
          |    | |    | |   |

            `,
            "коридор": `
          +-----------------+
          | \\             / |
          |    \\       /    |
          |      +---+      |
          |      |   |      |
          |      |   |      |
          +-----------------+
            `,
            "комната отдыха": `
          +---------------------+
          |                     |
          |  []     []     []   |
          |        _____        |
          |       |_____|       |
          |      (_______)      |
          +---------------------+
            `,
            "библиотека": `
          +---------------------+
          |        _____  +---+ |
          | +-+   |_____| |---| |
          | |  |  |_____| |   | |
          | |  |   _____  |---| |
          | |  |  |     | |___| |
          +---------------------+
            `,
            "кухня": `
          +--------------------+
          |        []     ___  |
          |        []    |   | |
          |              |___| |
          |   _________  |   | |
          |  |         | |___| |
          +--------------------+
            `,
            "столовая": `
          +---------------------+
          |                     |
          | |                 | |
          | |    |---|---|    | |
          | +--+ |   |   | +--+ |
          | |  | |---|---| |  | |
          +---------------------+
            `,
            "запасное_помещение": `
          +---------------------+
          |       .-----.       |
          |      /       \\     |
          |     /         \\    |
          |    /___________\\   |
          |                     |
          +---------------------+
            `,
            "комната_тестирования": `
          +---------------------+
          |  .-----..-----..   |
          |  |     | |     |   |
          |  |_____| |_____|   |
          |  |     | |     |   |
          |  |_____| |_____|   |
          +---------------------+
            `,
            "психологический_кабинет": `
          +--------------------+
          |        [|]         |
          | |     [___]        |
          | |                  |
          | +--+ +-----+  +--+ |
          | |  | [_____]  |  | |
          +--------------------+
            `,
            "смотровая": `
          +---------------------+
          |                     |
          |--+     +---+     +--|
          |  |     |   |     |  |
          |--+     +---+     +--|
          |                     |
          +---------------------+
            `,
            "передача": `
          +---------------------+
          |                     |
          |  ___        __      |
          | |   |      |  |     |
          | |   |  +---|__|--+  |
          | |___|  |   |  |  |  |
          +---------------------+
            `,
            "операционная": `
          +---------------------+
          |   .---. .---.       |
          |   |___| |___|       |
          |              |      |
          |   .---. .---.|__+---|
          |   |___| |___||  |   |
          +---------------------+
            `,
            "улица": `
          +---------------------+
          |~~  ~~~  / \\    | ~~~|
          |~~~~ |  /   \\    ~~~~|
          |~~~~   /     \\   ~~~~|
          |~~~   /       \\   ~~~|
          ||    /         \\    ||
          +---------------------+
            `
        };

        const locations = {
            "лаборатория": {
                description: "Вы находитесь в лаборатории. Запах химикатов наполняет воздух.",
                ascii: art["лаборатория"],
                objects: {}
            },
            "коридор": {
                description: "Вы в коридоре. Стены покрыты пятнами.",
                ascii: art["коридор"],
                objects: {}
            },
            "комната отдыха": {
                description: "Вы в комнате отдыха. Здесь есть несколько старых диванов.",
                ascii: art["комната отдыха"],
                objects: {}
            },
            "библиотека": {
                description: "Вы в библиотеке. Книги пылятся на полках.",
                ascii: art["библиотека"],
                objects: {}
            },
            "кухня": {
                description: "Вы находитесь на кухне. Здесь пусто и холодно.",
                ascii: art["кухня"],
                objects: {}
            },
            "столовая": {
                description: "Вы в столовой. Столы накрыты пылью.",
                ascii: art["столовая"],

            },
            "запасное_помещение": {
                description: "Вы в запасном помещении. Здесь темно и тихо.",
                ascii: art["запасное_помещение"],
                objects: {}
            },
            "комната_тестирования": {
                description: "Вы в комнате тестирования. Все выглядит странно.",
                ascii: art["комната_тестирования"],
                objects: {}
            },
            "психологический_кабинет": {
                description: "Вы в психологическом кабинете. Зеркала окружают вас.",
                ascii: art["психологический_кабинет"],
                objects: {}
            },
            "смотровая": {
                description: "Вы в смотровой. Здесь нет окон.",
                ascii: art["смотровая"],
                objects: {}
            },
            "передача": {
                description: "Вы в передаче. Место, где осуществляется передача данных.",
                ascii: art["передача"],
                objects: {}
            },
            "операционная": {
                description: "Вы в операционной. Стол для операций стоит посреди комнаты.",
                ascii: art["операционная"],
                objects: {}
            },
            "улица": {
                description: "Вы на улице. Вокруг шум и суета.",
                ascii: art["улица"],
                objects: {}
            },
            "начало": {
                description: "Вы находитесь в начале вашего путешествия.",
                ascii: "",
                objects: {}
            }
        };

        function getRandomEntity() {
            const entities = [
                {
                    name: "Существо",
                    ascii: `
                      .------.
                     /  ~ ~  \\
                    |  /  _  \\ |
                    | |  / \\  | |
                     \\ \\___/  /
                      '-------'
                    `,
                    dialogue: [
                        "Вы не понимаете, что оно говорит.",
                        "Ваши сны и реальность пересекаются.",
                        "Скрытые записи о вас..."
                    ]
                },
                {
                    name: "Тень",
                    ascii: `
                      .--.
                  .--'    '---.
                .'                '.
               /                    \\
              :                      :
              |                      |
              :                      :
               \\                    /
                '.__              _.'
                     '---._____.---'
                    `,
                    dialogue: [
                        "Тени обманывают ваш разум.",
                        "Никто не знает, кто вы на самом деле.",
                        "У вас есть секреты, которые должны быть раскрыты."
                    ]
                },
                {
                    name: "Призрак",
                    ascii: `
                        .-.
                       (   )
                      .-'-'-.
                    .-         -.
                  .'             '.
                  |    О     О    |
                  |     -     -    |
                  |      '._.'     |
                  |               |
                   '._         _.'
                      '-.....-'
                    `,
                    dialogue: [
                        "Вы заблудились в своих мыслях.",
                        "Сколько людей прошло мимо вас?",
                        "Все ваши страхи становятся реальностью."
                    ]
                }
            ];

            return entities[Math.floor(Math.random() * entities.length)];
        }

        function updateGameText(text) {
            gameText.innerText += text + "\n";
            gameText.scrollTop = gameText.scrollHeight;
			
        }

        function encounterEntity() {
            const entity = getRandomEntity();
            updateGameText(`Вы встретили ${entity.name}:\n${entity.ascii}\n\nЧто вы хотите сделать?`);

            const randomDialogue = entity.dialogue[Math.floor(Math.random() * entity.dialogue.length)];
            setTimeout(() => {
                updateGameText(randomDialogue);
            }, 2000);
        }
		
		function displayCommands() {
		const commands = `
			Доступные команды:
			- осмотреть: Описывает текущее местоположение.
			- идти <место>: Перемещает вас в указанное место.
			- взять <предмет>: Берет указанный предмет.
			- встретить: Встречает случайное существо.
			`;
			updateGameText(commands);
		}

        function executeCommand() {
            const command = inputField.value.toLowerCase().trim();
            inputField.value = '';

            if (command === "осмотреть") {
                const currentLocation = locations[playerState.location];
                updateGameText(currentLocation.description);
                updateGameText(currentLocation.ascii); // Отображение ASCII-арта локации
            } else if (command.startsWith("идти ")) {
                const destination = command.split(" ")[1];
                if (locations[playerState.location].exits[destination]) {
                    playerState.location = destination;
                    updateGameText(`Вы направились в ${destination}.`);
                    const currentLocation = locations[playerState.location];
                    updateGameText(currentLocation.description);
                    updateGameText(currentLocation.ascii); // Отображение ASCII-арта новой локации
                } else {
                    updateGameText("Вы не можете туда пойти.");
                }
            } else if (command.startsWith("взять ")) {
                const item = command.split(" ")[1];
                const currentLocation = locations[playerState.location];
                if (currentLocation.objects[item]) {
                    playerState.inventory.push(item);
                    delete currentLocation.objects[item];
                    updateGameText(`Вы взяли ${item}.`);
                } else {
                    updateGameText(`Нет ${item} для взятия.`);
                }
            } else if (command === "встретить") {
                encounterEntity();
            } else {
                updateGameText("Неизвестная команда.");
            }
        }
		


		
			// Начальная загрузка
			updateGameText("Добро пожаловать в Лоботомию Мозга.\n\n" + locations[playerState.location].description);
			displayCommands(); // Отображение доступных команд
			loadBackgroundImage("https://images.pexels.com/photos/1333407/pexels-photo-1333407.jpeg?auto=compress&cs=tinysrgb&dpr=2&h=650&w=940");
    </script>
</body>
</html>
